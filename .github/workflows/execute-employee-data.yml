name: Copy Employee Data for Email Signatures

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read

concurrency:
  group: execute-employee-data
  cancel-in-progress: false

jobs:
  execute-employee-data:
    name: Copy Employee Data for Email Signatures
    runs-on: ubuntu-latest
    environment: main
    container:
      image: python:3.10.12
    env:
      bamboo_hr_key: ${{ secrets.BAMBOO_HR_KEY }}
      azure_app_client_id: ${{ secrets.AZURE_APP_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bamboo_azure.py
        run: python3 bamboo_azure.py
