name: Backup BambooHR Employee Files to SharePoint

on:
  workflow_dispatch:
  schedule:
    # Daily at 07:00 UTC (≈ overnight in US/EU).
    - cron: '0 7 * * *'

jobs:
  execute-sharepoint-backup:
    name: Backup BambooHR Employee Files to SharePoint
    runs-on: ubuntu-latest
    container:
      image: python:3.10.12
    env:
      BAMBOO_HR_KEY: ${{ secrets.BAMBOO_HR_KEY }}
      AZURE_APP_CLIENT_ID: ${{ secrets.AZURE_APP_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      SHAREPOINT_HOSTNAME: ${{ secrets.SHAREPOINT_HOSTNAME }}
      SHAREPOINT_SITE_PATH: ${{ secrets.SHAREPOINT_SITE_PATH }}
      SHAREPOINT_DRIVE_NAME: ${{ secrets.SHAREPOINT_DRIVE_NAME }}
      SHAREPOINT_FOLDER_PATH: ${{ secrets.SHAREPOINT_FOLDER_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync_employee_files_to_sharepoint.py
        run: python3 sync_employee_files_to_sharepoint.py
